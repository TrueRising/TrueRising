backend:
  name: git-gateway
  branch: main

media_folder: "docs/assets/img"
public_folder: "/assets/img"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "docs/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact"
        name: "contact"
        file: "docs/content/settings/contact.json"
        fields:
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
